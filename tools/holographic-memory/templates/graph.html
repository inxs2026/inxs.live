<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knowledge Graph — Holographic Memory</title>
    <link rel="stylesheet" href="/static/hm.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        #graph { width: 100%; height: calc(100vh - 100px); }
        .node { cursor: pointer; }
        .node-topic circle { fill: #6B2D8C; }
        .node-file circle { fill: #1B75BC; }
        .link { stroke: #ccc; stroke-width: 1; }
        text { font-family: sans-serif; font-size: 10px; fill: #333; pointer-events: none; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 6px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; display: none; }
    </style>
</head>
<body>
<nav>
    <span class="logo">🧠 <a href="/">Holographic Memory</a></span>
    <a href="/">Home</a>
    <a href="/browse">Browse</a>
    <a href="/graph">Graph</a>
</nav>

<div id="graph"></div>
<div class="tooltip" id="tooltip"></div>

<script>
fetch('/api/graph')
    .then(r => r.json())
    .then(data => {
        const nodes = data.nodes.map(n => ({...n})));
        const edges = data.edges.map(e => ({...e}));

        const width = document.getElementById('graph').clientWidth;
        const height = document.getElementById('graph').clientHeight;

        const svg = d3.select('#graph')
            .append('svg')
            .attr('width', width)
            .attr('height', height);

        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(edges).id(d => d.id).distance(80))
            .force('charge', d3.forceManyBody().strength(-200))
            .force('center', d3.forceCenter(width/2, height/2))
            .force('collision', d3.forceCollide(20));

        // Links
        const link = svg.append('g').selectAll('line')
            .data(edges).join('line')
            .attr('class', 'link')
            .attr('stroke-opacity', 0.5);

        // Nodes
        const node = svg.append('g').selectAll('g')
            .data(nodes).join('g')
            .attr('class', d => `node node-${d.type}`)
            .call(d3.drag()
                .on('start', (event, d) => {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x; d.fy = d.y;
                })
                .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                .on('end', (event, d) => {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null; d.fy = null;
                }));

        node.append('circle')
            .attr('r', d => d.type === 'topic' ? 12 + Math.min(d.count * 2, 20) : 6 + Math.min(d.topic_count * 2, 10))
            .attr('fill', d => d.type === 'topic' ? '#6B2D8C' : '#1B75BC');

        node.append('text')
            .attr('dx', 14)
            .attr('dy', 4)
            .text(d => d.label);

        const tooltip = document.getElementById('tooltip');
        node.on('mouseover', (event, d) => {
            tooltip.style.display = 'block';
            tooltip.innerHTML = `<strong>${d.label}</strong><br>${d.type}${d.count !== undefined ? ' | ' + d.count + ' refs' : ''}`;
            tooltip.style.left = (event.pageX + 10) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
        }).on('mouseout', () => { tooltip.style.display = 'none'; });

        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });
    });
</script>
</body>
</html>
